name: Go CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files are not formatted properly:"
            gofmt -l .
            exit 1
          fi

      - name: Vet/Build/Test per chapter
        shell: bash
        run: |
          set -euo pipefail
          for d in ch01 ch02 ch03; do
            echo "===> $d"
            if [ -d "$d" ]; then
              (cd "$d" && go vet ./... || true)
              (cd "$d" && go build ./...)
              (cd "$d" && go test ./... || true)
            fi
          done