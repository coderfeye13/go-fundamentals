name: Go CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files are not formatted properly:"
            gofmt -l .
            exit 1
          fi

      - name: Build each Go file (learning repo friendly)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          files=(ch*/**/*.go)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No Go files found under ch*/"
            exit 0
          fi

          for f in "${files[@]}"; do
            echo "===> Building $f"
            go build -v "$f"
          done